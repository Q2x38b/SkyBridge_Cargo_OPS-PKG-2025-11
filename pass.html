<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boarding Pass</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: system-ui, sans-serif;
    }
    .pass {
      background: #fff;
      color: #0a0a0a;
      padding: 40px 60px;
      border-radius: 8px;
      text-align: center;
      max-width: 400px;
      border-left: 8px solid #c9a227;
    }
    .title {
      font-size: 12px;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      color: #1a3a5c;
    }
    .divider {
      border-top: 2px dashed #ccc;
      margin: 24px 0;
    }
    .details {
      font-size: 14px;
      color: #333;
      line-height: 1.8;
    }
    .flight {
      font-size: 32px;
      font-weight: 700;
      color: #1a3a5c;
      margin: 16px 0;
    }
    .status {
      background: #c9a227;
      color: #fff;
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
      display: inline-block;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="pass">
    <div class="title">BOARDING PASS</div>
    <h1>ISLAND ESCAPE</h1>
    <div class="divider"></div>
    <div class="details">DESTINATION</div>
    <div class="flight">FREEDOM</div>
    <div class="details">
      Congratulations, Castaway.<br>
      You made it off the island.
    </div>
    <div class="divider"></div>
    <div class="details">The Consortium lost today.</div>
    <div class="status">ESCAPED</div>
  </div>
</body>
</html>
